version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: recruiter_ollama
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: recruiter_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: recruiter_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:           # <-- THIS INJECTS YOUR API KEY
      - .env            
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - redis
      - ollama

  celery_worker:
    build: ./backend
    container_name: recruiter_worker
    command: celery -A core worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:           # <-- THIS INJECTS YOUR API KEY
      - .env            
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - redis
      - ollama

volumes:
  ollama_storage: